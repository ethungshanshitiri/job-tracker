name: Refresh Jobs & Deploy

on:
  schedule:
    # GitHub cron uses UTC. These cover Barcelona midnight in summer and winter.
    - cron: "0 22 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy even if scrape finds 0 results"
        required: false
        default: "false"

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "refresh-jobs-and-deploy"
  cancel-in-progress: true

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check Barcelona midnight
        id: schedule_gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          node <<'NODE'
          const fs = require("fs");

          const eventName = process.env.EVENT_NAME;
          const schedule = process.env.EVENT_SCHEDULE || "";
          const output = process.env.GITHUB_OUTPUT;

          function setOutput(shouldRun) {
            fs.appendFileSync(output, `should_run=${shouldRun ? "true" : "false"}\n`);
          }

          if (eventName !== "schedule") {
            setOutput(true);
            process.exit(0);
          }

          const match = schedule.match(/^0\s+(\d{1,2})\s+\*\s+\*\s+\*$/);
          if (!match) {
            console.log(`Unrecognized schedule ${schedule}. Skipping.`);
            setOutput(false);
            process.exit(0);
          }

          const cronHour = Number(match[1]);
          const now = new Date();
          const candidates = [-1, 0, 1].map((offset) =>
            Date.UTC(
              now.getUTCFullYear(),
              now.getUTCMonth(),
              now.getUTCDate() + offset,
              cronHour,
              0,
              0,
              0
            )
          );
          const intendedMs = Math.max(...candidates.filter((ms) => ms <= now.getTime() + 5 * 60 * 1000));
          const intended = new Date(intendedMs);
          const parts = new Intl.DateTimeFormat("en-GB", {
            timeZone: "Europe/Madrid",
            hour: "2-digit",
            minute: "2-digit",
            hourCycle: "h23",
            timeZoneName: "short",
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
          }).formatToParts(intended);
          const value = (type) => parts.find((part) => part.type === type)?.value || "";
          const localHour = value("hour");
          const localTime = `${value("year")}-${value("month")}-${value("day")} ${value("hour")}:${value("minute")} ${value("timeZoneName")}`;

          console.log(`Triggered by cron ${schedule}`);
          console.log(`Intended scheduled time UTC ${intended.toISOString()}`);
          console.log(`Intended Barcelona time ${localTime}`);

          const shouldRun = localHour === "00";
          if (!shouldRun) {
            console.log("Skipping because this scheduled UTC hour is not Barcelona midnight");
          }
          setOutput(shouldRun);
          NODE

      - name: Checkout repository
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/checkout@v6

      - name: Set up Node.js
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run scraper
        if: steps.schedule_gate.outputs.should_run == 'true'
        id: scrape
        run: |
          echo "Starting scrape at $(date -u)"
          node scripts/scrape.js
          echo "Scrape completed at $(date -u)"

          # Count results
          RESULT_COUNT=$(node -e "
            const d = JSON.parse(require('fs').readFileSync('data/jobs.json','utf8'));
            console.log((d.results||[]).length);
          ")
          echo "result_count=${RESULT_COUNT}" >> $GITHUB_OUTPUT
          echo "Found ${RESULT_COUNT} institutes with active openings"

      - name: Validate jobs.json
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('data/jobs.json','utf8'));
            if (!data.generatedAt) throw new Error('Missing generatedAt');
            if (!Array.isArray(data.results)) throw new Error('Missing results array');
            const expired = [];
            const now = Date.now();
            for (const inst of data.results) {
              for (const job of inst.jobs || []) {
                if (!job.rolling && job.deadline && new Date(job.deadline + 'T23:59:59Z').getTime() < now) {
                  expired.push(inst.id + ' ' + job.deadline);
                }
              }
            }
            if (expired.length) {
              throw new Error('Expired fixed-deadline jobs found: ' + expired.join(', '));
            }
            console.log('jobs.json is valid. Results:', data.results.length);
          "

      - name: Commit updated jobs.json
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          if git diff --staged --quiet; then
            echo "No changes to jobs.json, skipping commit"
          else
            git commit -m "chore refresh jobs data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Setup GitHub Pages
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: "."

      - name: Deploy to GitHub Pages
        if: steps.schedule_gate.outputs.should_run == 'true'
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Summary
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: |
          echo "## Scrape & Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Institutes with active openings:** ${{ steps.scrape.outputs.result_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Pages URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
